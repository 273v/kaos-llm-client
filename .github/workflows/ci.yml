name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  # ────────────── lint ──────────────
  # Separate from tests so format / lint / type failures fail-fast and
  # are easy to spot without combing through test output.
  lint:
    name: Lint
    runs-on: kaos-x64-16core
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Set up uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock

      - name: Install Python 3.13
        run: uv python install 3.13

      - name: Install dependencies
        run: uv sync --group dev --extra azure --python 3.13

      - name: Ruff format check
        run: uv run ruff format --check kaos_llm_client/ tests/

      - name: Ruff lint
        run: uv run ruff check kaos_llm_client/ tests/

      - name: Type check (ty)
        run: uv run ty check kaos_llm_client/ tests/

  # ────────────── pre-commit ──────────────
  # Catches any drift between the local pre-commit config and the
  # checks above. If a contributor disabled their local hooks, this
  # job still enforces the contract on the PR.
  pre-commit:
    name: Pre-commit hooks
    runs-on: kaos-x64-16core
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Set up uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock

      - name: Install Python 3.13
        run: uv python install 3.13

      - name: Install dependencies (needed by the local ty hook)
        run: uv sync --group dev --extra azure --python 3.13

      - name: Run pre-commit
        run: uvx pre-commit run --all-files --show-diff-on-failure

  # ────────────── test ──────────────
  test:
    name: Test (${{ matrix.display-os }} / Python ${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    # Linux x64 (self-hosted) keeps the 4-Python-version matrix for
    # fast PR feedback. macOS-arm64 + Windows-x64 each get a single
    # Python 3.13 leg, gated experimental until proven stable.
    # Mirrors the cross-OS pattern across the kaos-* family.
    strategy:
      fail-fast: false
      matrix:
        include:
          # ── Linux x64 (self-hosted) — full Python matrix ──
          - python-version: "3.13"
            os: kaos-x64-16core
            display-os: linux-x64
            experimental: false
          - python-version: "3.14"
            os: kaos-x64-16core
            display-os: linux-x64
            experimental: false
          # Free-threaded build (PEP 703).
          - python-version: "3.14t"
            os: kaos-x64-16core
            display-os: linux-x64
            experimental: true
          # Pre-release of 3.15.
          - python-version: "3.15"
            os: kaos-x64-16core
            display-os: linux-x64
            experimental: true
          # ── macOS arm64 — single Python smoke ──
          - python-version: "3.13"
            os: macos-14
            display-os: macos-arm64
            experimental: true
          # ── Windows x64 — single Python smoke ──
          - python-version: "3.13"
            os: windows-latest
            display-os: windows-x64
            experimental: true
    continue-on-error: ${{ matrix.experimental }}
    env:
      # PEP 540 UTF-8 Mode + stdout encoding override — Windows cp1252
      # default codepage crashes on Unicode stdout / file opens.
      PYTHONUTF8: "1"
      PYTHONIOENCODING: utf-8
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Set up uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock
          cache-suffix: test-${{ matrix.display-os }}-py${{ matrix.python-version }}

      - name: Install Python ${{ matrix.python-version }}
        # `--preview` lets `uv python install` resolve in-development
        # interpreters (3.15) and the free-threaded variant (3.14t).
        # No-op for stable versions.
        run: uv python install --preview ${{ matrix.python-version }}

      - name: Install dependencies
        continue-on-error: ${{ matrix.experimental }}
        run: uv sync --group dev --python ${{ matrix.python-version }}

      - name: Run unit tests with coverage
        continue-on-error: ${{ matrix.experimental }}
        # Only `tests/unit/` runs in regular CI. `tests/integration/`
        # is the live-tier (real provider APIs) and runs separately
        # with credentials gated behind a manual workflow.
        # `shell: bash` for the `\` continuations on Windows.
        shell: bash
        run: |
          uv run pytest tests/unit/ \
            --cov=kaos_llm_client \
            --cov-branch \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml

      - name: Upload coverage report
        if: always() && !matrix.experimental
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: coverage-${{ matrix.display-os }}-py${{ matrix.python-version }}
          path: coverage.xml
          retention-days: 14

  # ────────────── min-deps ──────────────
  # Resolve and test against the minimum declared versions of every
  # dependency so we catch "we said >=X but actually need X+1" drift.
  # Runs on 3.13 only; 3.14 is the cutting edge and may not have wheels
  # for very old dep versions.
  min-deps:
    name: Test against minimum dependencies
    runs-on: kaos-x64-16core
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Set up uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0

      - name: Install Python 3.13
        run: uv python install 3.13

      - name: Install with lowest-direct resolution
        run: uv sync --group dev --resolution=lowest-direct --python 3.13

      - name: Run unit tests
        run: |
          uv run pytest tests/unit/ \
            --no-cov \
            -q

  # ────────────── build + wheel smoke test ──────────────
  build:
    name: Build distribution + smoke test
    runs-on: kaos-x64-16core
    needs: [lint, test]
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Set up uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock

      - name: Install Python 3.13
        run: uv python install 3.13

      - name: Build wheel + sdist
        run: uv build

      - name: Verify metadata (twine check)
        run: uvx --from twine twine check --strict dist/*

      - name: Smoke-test the built wheel in a clean venv
        # Install the actually-built wheel (not the source tree) into a
        # clean Python environment and exercise the public API. This
        # catches packaging bugs that source-tree tests miss: missing
        # data files, broken `__init__.py` exports, sdist-only files
        # that reference dist-only paths, etc.
        run: |
          uv venv --python 3.13 /tmp/smoke
          uv pip install --python /tmp/smoke/bin/python dist/kaos_llm_client-*-py3-none-any.whl
          /tmp/smoke/bin/python -c "
          import kaos_llm_client
          assert kaos_llm_client.__version__, 'version missing from wheel'
          # Public API surface imports without error.
          from kaos_llm_client import (
              AssistantMessage,
              CachePoint,
              ChatMessages,
              KaosLLMError,
              SystemMessage,
              ToolResultMessage,
              UserMessage,
              create_client,
              register_llm_client_tools,
          )
          # create_client resolves a provider-prefixed model string.
          assert create_client is not None
          print(f'kaos-llm-client {kaos_llm_client.__version__}: public API OK')
          "
          # Exercise the CLI entrypoint.
          /tmp/smoke/bin/kaos-llm-client --help

      - name: Upload distribution artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: dist-${{ github.sha }}
          path: dist/
          retention-days: 7
